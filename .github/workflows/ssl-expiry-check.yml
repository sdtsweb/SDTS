name: SSL expiry check

# Runs every day at 14:00 UTC. Reads the live cert on each domain and, if any
# domain expires within 14 days, opens a GitHub issue.
# This is a backstop in case the renew workflow fails silently.
on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install cryptography

      - name: Read live cert expiries
        id: check
        run: python scripts/ssl/check_expiry.py

      - name: Open warning issue if expiring soon
        if: steps.check.outputs.needs_renewal == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const minDays = "${{ steps.check.outputs.min_days }}";
            const summary = `${{ steps.check.outputs.summary }}`;
            // Avoid duplicate issues — find existing open ssl-expiry issue
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "ssl-expiry-warning",
            });
            const title = `SSL cert expires in ${minDays} days`;
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `Daily check (still expiring soon):\n\n${summary}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: [
                  `### SSL certificate is about to expire`,
                  ``,
                  summary,
                  ``,
                  `If the auto-renew workflow has been running, there should already be an "Install new SSL cert" issue open with a fresh cert ready to install.`,
                  ``,
                  `If not, run the **SSL renew** workflow manually:`,
                  `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/workflows/ssl-renew.yml`,
                  ``,
                  `Click "Run workflow" in the top-right.`,
                ].join("\n"),
                labels: ["ssl-expiry-warning", "ops"],
              });
            }
